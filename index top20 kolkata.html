<style>
  :root{
    --ink:#191510; --paper:#F4EEE2; --card:#FBF7EE; --accent:#B4321F; --mute:#8A8071;
    --sans:'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    --serif:'Fraunces', Georgia, serif;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--sans);
    overscroll-behavior-y:none;
  }
  #app{
    max-width:520px; margin:0 auto; min-height:100%;
    display:flex; flex-direction:column;
    background:var(--paper);
    position:relative;
  }
  .no-bar::-webkit-scrollbar{display:none;}
  .no-bar{scrollbar-width:none;}

  /* header */
  header{
    padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;
    border-bottom:1px solid rgba(25,21,16,.10);
    display:flex; align-items:flex-end; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    background:rgba(244,238,226,.92); backdrop-filter:blur(12px);
  }
  .brand{font-family:var(--serif); font-weight:900; font-size:30px; line-height:1; letter-spacing:-.02em;}
  .brand b{color:var(--accent);}
  .tagline{font-size:10.5px; color:var(--mute); letter-spacing:.16em; text-transform:uppercase; margin-top:5px; font-weight:600;}
  .hbtns{display:flex; align-items:center; gap:14px;}
  .live{display:flex; align-items:center; gap:5px;}
  .dot{width:7px; height:7px; border-radius:99px; background:var(--accent); display:inline-block; animation:pulse 1.6s infinite;}
  .live span{font-size:10px; font-weight:700; color:var(--accent); letter-spacing:.1em;}
  .iconbtn{border:none; background:transparent; cursor:pointer; color:var(--ink); padding:4px; display:flex;}
  .iconbtn svg{width:21px; height:21px;}
  .spin{animation:spin 1s linear infinite;}

  /* chips */
  .chips{display:flex; overflow-x:auto; gap:8px; padding:12px 16px 10px; border-bottom:1px solid rgba(25,21,16,.07); background:rgba(255,255,255,.25); position:sticky; top:var(--hh,64px); z-index:15;}
  .chip{flex:0 0 auto; padding:7px 14px; border-radius:999px; border:1.5px solid rgba(25,21,16,.14); background:transparent; color:var(--ink); font-family:var(--sans); font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; transition:all .18s;}
  .chip.on{color:#fff;}
  #searchbar{padding:0 16px 10px; background:rgba(255,255,255,.25);}
  #searchbar input{width:100%; border:1.5px solid rgba(25,21,16,.16); border-radius:11px; padding:10px 13px; font-family:var(--sans); font-size:14px; background:#fff; color:var(--ink); outline:none;}
  #searchbar input:focus{border-color:var(--accent);}

  /* body */
  main{flex:1; overflow-y:auto; padding:14px 16px calc(env(safe-area-inset-bottom) + 92px);}

  /* print card */
  .pcard{background:var(--card); border:1px solid rgba(25,21,16,.08); border-radius:16px; padding:16px; margin-bottom:12px; cursor:pointer; touch-action:manipulation; animation:rise .4s ease both;}
  .meta{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .badge{font-family:var(--sans); font-weight:700; font-size:10px; letter-spacing:.06em; color:#fff; padding:3px 8px; border-radius:5px; text-transform:uppercase;}
  .time{font-size:11px; color:var(--mute); display:flex; align-items:center; gap:4px;}
  .ptitle{font-family:var(--serif); font-weight:600; font-size:18.5px; line-height:1.18; margin:0;}
  .pdek{font-size:13px; color:#5c5446; line-height:1.45; margin:8px 0 0;}

  /* video card */
  .vcard{display:block; text-decoration:none; color:inherit; margin-bottom:16px; cursor:pointer; animation:rise .4s ease both;}
  .thumbwrap{position:relative; width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; background:#211c14; border:1px solid rgba(25,21,16,.1);}
  .thumbwrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .playbtn{position:absolute; inset:0; margin:auto; width:54px; height:54px; border-radius:99px; background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.25);}
  .vtitle{font-family:var(--serif); font-weight:600; font-size:16px; line-height:1.22; margin:10px 0 0;}
  .vmeta{display:flex; align-items:center; gap:8px; margin-top:7px;}

  /* open-channel tile (fallback) */
  .openchan{display:flex; align-items:center; justify-content:space-between; gap:10px; text-decoration:none; color:inherit; background:var(--card); border:1px solid rgba(25,21,16,.08); border-radius:14px; padding:16px; margin-bottom:12px;}
  .openchan .lbl{font-family:var(--serif); font-weight:600; font-size:16px;}

  /* summary */
  .subtoggle{display:flex; background:rgba(25,21,16,.06); border-radius:12px; padding:4px; margin-bottom:14px;}
  .subtoggle button{flex:1; border:none; cursor:pointer; padding:9px 0; border-radius:9px; background:transparent; color:var(--ink); font-family:var(--sans); font-weight:600; font-size:13px;}
  .subtoggle button.on{background:var(--ink); color:var(--paper);}
  .sumhead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px;}
  .sumhead .lt{font-size:12px; font-weight:600; color:var(--mute); display:flex; align-items:center; gap:6px;}
  .refresh{border:none; background:var(--ink); color:var(--paper); border-radius:10px; padding:9px 14px; font-family:var(--sans); font-weight:700; font-size:12.5px; cursor:pointer; display:flex; align-items:center; gap:7px;}
  .refresh:disabled{opacity:.55;}
  .scard{background:var(--card); border:1px solid rgba(25,21,16,.08); border-left:3px solid var(--accent); border-radius:12px; padding:13px 15px; margin-bottom:10px; touch-action:manipulation; animation:rise .4s ease both;}
  .podbtn{width:100%; border:none; cursor:pointer; background:#3E5C50; color:#F4EEE2; border-radius:13px; padding:14px 0; font-family:var(--sans); font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:16px; box-shadow:0 4px 14px rgba(62,92,80,.28); transition:opacity .15s;}
  .podbtn:disabled{opacity:.45;}
  .snum{font-family:var(--sans); font-weight:800; font-size:11px; color:var(--accent); letter-spacing:.04em;}
  .stitle{font-family:var(--serif); font-weight:600; font-size:15.5px; line-height:1.25; margin:3px 0 0;}
  .sdesc{font-size:12.5px; color:#5c5446; line-height:1.4; margin:5px 0 0;}

  /* states */
  .note{text-align:center; color:var(--mute); font-size:12.5px; line-height:1.5; padding:10px 14px;}
  .skel{background:var(--card); border:1px solid rgba(25,21,16,.06); border-radius:16px; height:96px; margin-bottom:12px; position:relative; overflow:hidden;}
  .skel::after{content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent); animation:shimmer 1.3s infinite;}

  /* bottom tabs */
  nav{position:fixed; left:0; right:0; bottom:0; max-width:520px; margin:0 auto; background:rgba(244,238,226,.94); backdrop-filter:blur(12px); border-top:1px solid rgba(25,21,16,.1); display:flex; padding:10px 12px calc(env(safe-area-inset-bottom) + 12px); z-index:30;}
  nav button{flex:1; border:none; background:transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--mute); font-family:var(--sans);}
  nav button.on{color:var(--accent);}
  nav button svg{width:22px; height:22px;}
  nav span{font-size:11px; font-weight:500;}
  nav button.on span{font-weight:700;}

  /* sheets / settings */
  .scrim{position:fixed; inset:0; z-index:40; background:rgba(10,9,7,.45); display:flex; align-items:flex-end; max-width:520px; margin:0 auto;}
  .sheet{width:100%; background:var(--paper); border-radius:26px 26px 0 0; padding:10px 22px calc(env(safe-area-inset-bottom) + 30px); animation:up .28s cubic-bezier(.2,.8,.2,1) both; max-height:86vh; overflow-y:auto;}
  .grip{width:42px; height:5px; border-radius:99px; background:rgba(25,21,16,.2); margin:4px auto 16px;}
  .field{width:100%; border:1.5px solid rgba(25,21,16,.18); border-radius:10px; padding:11px 12px; font-family:var(--sans); font-size:14px; margin-top:6px; background:#fff;}
  .pbtn{margin-top:16px; width:100%; border:none; cursor:pointer; background:var(--ink); color:var(--paper); border-radius:12px; padding:14px 0; font-family:var(--sans); font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;}

  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes up{from{transform:translateY(100%);} to{transform:none;}}
  @keyframes shimmer{to{transform:translateX(100%);}}
</style>
</head>

  <header>

/* fetch several feeds, merge, de-dupe by title, newest first; one dead feed never blocks the rest */
async function fetchMany(urls){
  const out = [];
  const res = await Promise.allSettled(urls.map(async u => {
    try{ const items = parsePrint(await proxyFetch(u)); if(items.length) return items; throw 0; }
    catch(e){ return await fetchViaRss2Json(u); }   // bridge fallback (handles Google News)
  }));
  res.forEach(r => { if(r.status==="fulfilled") out.push(...r.value); });
  const seen = new Set();
  return out.sort((a,b)=>b.ts-a.ts).filter(i => {
    const k = i.title.toLowerCase().slice(0,45); if(seen.has(k)) return false; seen.add(k); return true;
  });
}

/* --- helpers --- */
function load(k, d){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; }catch(e){ return d; } }
function save(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function strip(html){ const d=document.createElement("div"); d.innerHTML=html||""; return (d.textContent||"").replace(/\s+/g," ").trim(); }
function timeAgo(ts){
  if(!ts) return "";
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+"s"; const m=Math.floor(s/60);
  if(m<60) return m+"m"; const h=Math.floor(m/60);
  if(h<24) return h+"h"; const d=Math.floor(h/24); return d+"d";
}
function colorFor(list,id){ const x=list.find(s=>s.id===id); return x?x.color:"#191510"; }
let _renderTimer;
function scheduleRender(){ clearTimeout(_renderTimer); _renderTimer = setTimeout(() => render(), 120); }

async function proxyFetch(url){
  // cache-bust so the proxy AND the upstream feed serve fresh content on every refresh
  const fresh = url + (url.includes("?") ? "&" : "?") + "_=" + Date.now();
  const attempt = make => {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 6500);
    return fetch(make(fresh), { cache:"no-store", signal:ctrl.signal }).then(async r => {
      clearTimeout(to);
      if(!r.ok) throw new Error("HTTP "+r.status);
      const t = await r.text();
      if(t && t.length > 150) return t;
      throw new Error("empty");
    }).catch(e => { clearTimeout(to); throw e; });
  };
  // race all proxies at once; first one to succeed wins — uses manual race for iOS Safari compatibility
  return new Promise((resolve, reject) => {
    let settled = false, pending = PROXIES.length;
    PROXIES.map(attempt).forEach(p => {
      p.then(v => { if(!settled){ settled=true; resolve(v); } })
       .catch(() => { if(--pending === 0 && !settled) reject(new Error("all proxies failed")); });
    });
  });
}

/* RSS-to-JSON bridge: fetches a feed server-side and returns CORS-friendly JSON.
   Tries multiple bridge services so one going down doesn't break everything. */
async function fetchViaRss2Json(url){
  const parseR2J = j => {
    if(j.status !== "ok" || !Array.isArray(j.items)) throw new Error("bad");
    return j.items.map(it => {
      let dek = strip(it.description || it.content || "");
      if(dek.length > 180) dek = dek.slice(0,178) + "…";
      return { title: strip(it.title), link: it.link, dek, ts: it.pubDate ? Date.parse(it.pubDate.replace(" ","T")+"Z") : 0 };
    }).filter(x => x.title && x.link).sort((a,b)=>b.ts-a.ts).slice(0, 25);
  };
  // Try rss2json.com
  try{
    const r = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url), { cache:"no-store" });
    if(r.ok){ const j = await r.json(); const items = parseR2J(j); if(items.length) return items; }
  }catch(e){}
  // Try via CORS proxy chain (raw XML parse fallback)
  try{
    const text = await proxyFetch(url);
    const items = parsePrint(text);
    if(items.length) return items;
  }catch(e){}
  throw new Error("all rss2json methods failed");
}

/* --- parsers --- */
function parsePrint(xml){
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  let nodes = [...doc.getElementsByTagName("item")];
  if(!nodes.length) nodes = [...doc.getElementsByTagName("entry")]; // Atom
  return nodes.map(n => {
    const g = t => { const e = n.getElementsByTagName(t)[0]; return e ? e.textContent.trim() : ""; };
    // namespace-robust: find first child whose localName matches and has text (handles content:encoded etc.)
    const gLocal = local => {
      for(const e of n.getElementsByTagName("*")){
        if(e.localName === local){ const tx = (e.textContent||"").trim(); if(tx) return tx; }
      }
      return "";
    };
    let link = g("link");
    if(!link){ const l = n.getElementsByTagName("link")[0]; if(l) link = l.getAttribute("href") || ""; }
    let title = g("title");
    // Google News appends " - Source"; keep title clean
    const pub = g("pubDate") || g("published") || g("updated") || g("dc:date");
    let dek = strip(gLocal("description") || gLocal("encoded") || gLocal("summary") || gLocal("content") || g("media:description"));
    if(dek.length > 180) dek = dek.slice(0,178) + "…";
    return { title: strip(title), link, dek, ts: pub ? Date.parse(pub) : 0 };
  }).filter(x => x.title && x.link).sort((a,b)=>b.ts-a.ts).slice(0, 25);
}

function parseVideo(xml){
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  const nodes = [...doc.getElementsByTagName("entry")];
  return nodes.map(n => {
    const g = t => { const e = n.getElementsByTagName(t)[0]; return e ? e.textContent.trim() : ""; };
    let vid = g("yt:videoId") || g("videoId");
    if(!vid){ const m = (n.getElementsByTagName("link")[0]?.getAttribute("href")||"").match(/v=([\w-]+)/); if(m) vid = m[1]; }
    const stat = n.getElementsByTagName("media:statistics")[0] || n.getElementsByTagName("statistics")[0];
    const views = stat ? stat.getAttribute("views") : "";
    const pub = g("published") || g("updated");
    return {
      vid,
      title: strip(g("title")),
      thumb: vid ? `https://i.ytimg.com/vi/${vid}/hqdefault.jpg` : "",
      views: views ? Number(views).toLocaleString("en-IN") : "",
      ts: pub ? Date.parse(pub) : 0,
    };
  }).filter(x => x.vid && x.title).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0, 15);
}

/* --- loaders (independent; one failure never blocks the rest) --- */
async function fetchWpJson(url){
  const text = await proxyFetch(url);
  const posts = JSON.parse(text);
  if(!Array.isArray(posts) || !posts.length) throw new Error("no posts");
  return posts.map(p => ({
    title: strip(p.title?.rendered||""),
    link: p.link||"",
    dek: (() => { const t = strip(p.excerpt?.rendered||""); return t.length>178 ? t.slice(0,178)+"…" : t; })(),
    ts: p.date ? Date.parse(p.date) : 0
  })).filter(p => p.title && p.link);
}

async function loadPrint(src){
  const store = items => {
    items.forEach(i => { i.src = src.id; i.sourceName = src.name; });
    state.print[src.id] = items; save("brief.print."+src.id, items); scheduleRender();
  };
  // WordPress REST API: gives real excerpts when RSS is blocked
  if(src.wpjson){
    try{ const items = await fetchWpJson(src.wpjson); if(items.length){ store(items); return; } }catch(e){}
  }
  // Merged source (e.g. Markets & IPO): combine reports from ALL its feeds
  if(src.merge){
    try{ const items = await fetchMany(src.feeds); if(items.length){ store(items); return; } }catch(e){}
  }
  // bridge:true -> try the RSS-to-JSON bridge first (better at pulling the brief/summary)
  const fetchOne = async (url, useBridge) =>
    useBridge ? fetchViaRss2Json(url) : parsePrint(await proxyFetch(url));
  const order = src.bridge ? [true, false] : [false, true];
  for(const useBridge of order){
    for(const url of src.feeds){
      try{ const items = await fetchOne(url, useBridge); if(items.length){ store(items); return; } }
      catch(e){ /* try next */ }
    }
  }
}
async function loadVideo(ch){
  // Fetch the channel feed through ALL proxies at once and merge the results.
  // A single proxy that serves a stale/cached copy can no longer hide new uploads —
  // any proxy that returns a fresh copy contributes its newest videos to the pool.
  const tryId = async id => {
    if(!id) return [];
    const feed = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}&_=${Date.now()}`;
    const texts = await Promise.allSettled(PROXIES.map(make => {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 7000);
      return fetch(make(feed), { cache:"no-store", signal:ctrl.signal })
        .then(r => { clearTimeout(to); if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
        .catch(e => { clearTimeout(to); throw e; });
    }));
    let merged = [];
    texts.forEach(t => {
      if(t.status === "fulfilled" && t.value && t.value.length > 150){
        try{ merged.push(...parseVideo(t.value)); }catch(e){}
      }
    });
    const seen = new Set();
    merged = merged.filter(v => { if(!v.vid || seen.has(v.vid)) return false; seen.add(v.vid); return true; })
                   .sort((a,b) => (b.ts||0) - (a.ts||0))
                   .slice(0, 15);
    return merged.map(v => { if(v.vid && !v.thumb) v.thumb = `https://i.ytimg.com/vi/${v.vid}/hqdefault.jpg`; return v; });
  };

  // Prefer the verified hardcoded ytid. A cached scraped id is only a fallback.
  const cachedId = localStorage.getItem("brief.ytid."+ch.id);
  if(ch.ytid && cachedId && cachedId !== ch.ytid) localStorage.removeItem("brief.ytid."+ch.id);
  let id = ch.ytid || cachedId;
  let items = await tryId(id);

  // Fallback ONLY when the verified id returned nothing: resolve the channel's own id from its handle page.
  // Note: we deliberately do NOT use the loose /channel\/UC.../ pattern — on a channel page that also
  // matches recommended/related channels and would replace the correct feed with the wrong one.
  if(!items.length && ch.handle){
    try{
      const html = await proxyFetch("https://www.youtube.com/"+ch.handle);
      const patterns = [
        /"(?:channelId|externalId)":"(UC[\w-]{22})"/,
        /"browseId":"(UC[\w-]{22})"/,
        /data-channel-external-id="(UC[\w-]{22})"/,
        /<link rel="canonical" href="https:\/\/www\.youtube\.com\/channel\/(UC[\w-]{22})">/
      ];
      let newId = null;
      for(const p of patterns){ const m = html.match(p); if(m && m[1]){ newId = m[1]; break; } }
      if(newId && newId !== id){
        const fresh = await tryId(newId);
        if(fresh.length){ items = fresh; localStorage.setItem("brief.ytid."+ch.id, newId); }
      }
    }catch(e){}
  }
  // Keep only valid, thumbnailed videos so a single bad entry can never blank a channel.
  items = (items||[]).filter(v => v.vid && v.thumb);

  // Merge fresh videos with whatever we had cached, de-dupe by video id, keep the 15 newest.
  // Result: brand-new uploads always rise to the top, old ones naturally fall off,
  // and if a refresh fetches nothing we still keep showing the cached list (never blank).
  const prev = state.video[ch.id] || load("brief.video."+ch.id, []) || [];
  const byId = new Map();
  [...items, ...prev].forEach(v => { if(v && v.vid && v.thumb && !byId.has(v.vid)) byId.set(v.vid, v); });
  let outv = [...byId.values()].sort((a,b) => (b.ts||0) - (a.ts||0)).slice(0, 15);

  if(outv.length){
    outv.forEach(i => { i.ch = ch.id; i.channelName = ch.name; });
    state.video[ch.id] = outv;
    save("brief.video."+ch.id, outv);
    scheduleRender();
  }
}

function hydrateCache(){
  PRINT.forEach(s => { const c = load("brief.print."+s.id, null); if(c) state.print[s.id] = c; });
  VIDEO.forEach(c => {
    let v = load("brief.video."+c.id, null);
    if(v && v.length){
      // Drop only the individual blank/invalid entries — never wipe the whole channel.
      v = v.filter(i => i && i.vid && i.thumb);
      if(v.length){
        state.video[c.id] = v;
        save("brief.video."+c.id, v);
      } else {
        localStorage.removeItem("brief.video."+c.id);
      }
    }
  });
}

/* --- AI summary (Anthropic API only on this action, only if key saved) --- */
async function aiSummarize(breakingCands, aiCands){
  const key = localStorage.getItem("brief.key");
  if(!key) return null;
  const model = localStorage.getItem("brief.model") || "claude-3-5-sonnet-latest";
  const prompt =
`You are a sharp news editor. From the two headline lists below, output ONLY a JSON object:
{"breaking":[15 items],"ai":[15 items]}
Each item = {"t":"punchy headline, max 14 words","d":"one sentence on why it matters, max 24 words"}.
Pick the 15 most significant in each list, de-duplicate near-identical stories, and keep the two lists fully distinct (no story may appear in both), no preamble, JSON only.

BREAKING HEADLINES:
${breakingCands.join("\n")}

AI HEADLINES:
${aiCands.join("\n")}`;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({ model, max_tokens:2200, messages:[{ role:"user", content:prompt }] }),
  });
  if(!r.ok){ throw new Error("API "+r.status+": "+(await r.text()).slice(0,200)); }
  const j = await r.json();
  const txt = (j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

async function refreshSummary(){
  if(state.loadingSum) return;
  state.loadingSum = true; render();
  try{
    // Breaking: from your loaded newspapers only (general news, no API)
    const breakingItems = Object.values(state.print).flat().filter(Boolean).sort((a,b)=>b.ts-a.ts);
    const breakingCands = breakingItems.slice(0,30).map(i => i.dek ? `${i.title} — ${i.dek}` : i.title);
    // Top AI: from dedicated AI publications only (no API) — a different pool, so the lists differ
    let aiItems = [];
    try{ aiItems = await fetchMany(AI_FEEDS); }catch(e){}
    const aiCands = aiItems.slice(0,30).map(i => i.dek ? `${i.title} — ${i.dek}` : i.title);

    let result = null;
    try{ result = await aiSummarize(breakingCands, aiCands); }catch(e){ console.warn(e); }

    const dekFor = (arr, title) => { const m = arr.find(x => x.title === title); return m && m.dek ? m.dek : ""; };

    if(!result){
      const seen = new Set();
      const top = (arr) => {
        const out=[];
        for(const i of arr){ const k=i.title.toLowerCase().slice(0,40); if(seen.has(k))continue; seen.add(k);
          out.push({ t:i.title, d: i.dek || i.sourceName || "", l: i.link||"" }); if(out.length>=15)break; }
        return out;
      };
      result = { breaking: top(breakingItems), ai: top(aiItems), aiWritten:false };
    } else {
      result.aiWritten = true;
      const findLink = (title, sources) => { const m = sources.find(i => i.title && i.title.toLowerCase().slice(0,40) === (title||"").toLowerCase().slice(0,40)); return m ? m.link||"" : ""; };
      (result.breaking||[]).forEach(it => { if(!it.d) it.d = dekFor(breakingItems, it.t); if(!it.l) it.l = findLink(it.t, breakingItems); });
      (result.ai||[]).forEach(it => { if(!it.d) it.d = dekFor(aiItems, it.t); if(!it.l) it.l = findLink(it.t, aiItems); });
    }

    state.sum = { breaking:result.breaking||[], ai:result.ai||[], ts:Date.now(), aiWritten:!!result.aiWritten };
    save("brief.sum", state.sum);
  }finally{
    state.loadingSum = false; render();
  }
}

/* --- rendering --- */
function renderChips(){
  if(state.tab === "summary" || state.tab === "search"){ $chips.style.display="none"; return; }
  $chips.style.display="flex";
  const src = state.tab === "print" ? PRINT.slice() : VIDEO.slice();
  // alphabetical by name, but any source flagged end:true goes to the very end
  src.sort((a,b) => (!!a.end - !!b.end) || a.name.localeCompare(b.name));
  const list = [{id:"all",name:"All",color:"#191510"}, ...src];
  const cur = state.tab === "print" ? state.printSrc : state.videoSrc;
  $chips.innerHTML = list.map(s => {
    const on = s.id === cur;
    // always colour-coded: filled when active, soft tint + coloured text/border otherwise
    const style = on
      ? `background:${s.color};border-color:${s.color};color:#fff;`
      : `background:${s.color}1A;border-color:${s.color};color:${s.color};`;
    return `<button class="chip ${on?"on":""}" data-src="${s.id}" style="${style}">${esc(s.name)}</button>`;
  }).join("");
  $chips.querySelectorAll(".chip").forEach(b => b.onclick = () => {
    if(state.tab==="print") state.printSrc = b.dataset.src; else state.videoSrc = b.dataset.src;
    render();
  });
}

function renderPrint(){
  let items;
  if(state.printSrc === "all") items = Object.values(state.print).flat().filter(Boolean).sort((a,b)=>b.ts-a.ts);
  else items = (state.print[state.printSrc]||[]).slice().sort((a,b)=>b.ts-a.ts);
  items = items.filter(matchesQuery);

  if(!items.length){
    $main.innerHTML = Object.keys(state.print).length
      ? `<p class="note">No stories yet for this source.<br>Pull the reload icon at top right.</p>`
      : Array(5).fill('<div class="skel"></div>').join("");
    return;
  }
  $main.innerHTML = items.map((a,i) => {
    const c = colorFor(PRINT,a.src);
    return `
    <article class="pcard" data-link="${esc(a.link)}" style="animation-delay:${i*35}ms;border-left:4px solid ${c};background:${c}12">
      <div class="meta">
        <span class="badge" style="background:${c}">${esc((PRINT.find(s=>s.id===a.src)||{}).short||a.src)}</span>
        <span class="time">${a.ts?timeAgo(a.ts)+" ago":""}</span>
      </div>
      <h2 class="ptitle">${esc(a.title)}</h2>
      ${a.dek?`<p class="pdek">${esc(a.dek)}</p>`:""}
    </article>`; }).join("");
  $main.querySelectorAll(".pcard").forEach(c => c.onclick = () => {
    const url = c.dataset.link; if(!url) return;
    const a = Object.assign(document.createElement('a'), {href:url, target:'_blank', rel:'noopener'});
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });
}

function renderVideo(){
  const channels = state.videoSrc === "all" ? VIDEO : VIDEO.filter(c => c.id === state.videoSrc);
  let html = "";

  if(state.videoSrc === "all"){
    const all = Object.values(state.video).flat().filter(Boolean).sort((a,b)=>b.ts-a.ts).filter(matchesQuery);
    if(all.length){
      html += all.map((v,i)=>videoCard(v,i)).join("");
    } else if(!Object.keys(state.video).length){
      html += Array(3).fill('<div class="skel" style="height:0;padding-bottom:56%"></div>').join("");
    }
    // channels with no inline feed -> show open-channel tiles (hide while searching)
    if(!state.query) VIDEO.filter(c=>!c.ytid).forEach(c => html += openChannelTile(c));
  } else {
    const ch = channels[0];
    const vids = (state.video[ch.id] || []).filter(matchesQuery);
    if(vids.length) html += vids.map((v,i)=>videoCard(v,i)).join("");
    else if(ch.ytid) html += Array(3).fill('<div class="skel" style="height:0;padding-bottom:56%"></div>').join("") + openChannelTile(ch,true);
    else html += openChannelTile(ch);
  }
  $main.innerHTML = html || `<p class="note">Tap a channel above.</p>`;
}

function videoCard(v,i){
  const url = `https://www.youtube.com/watch?v=${v.vid}`;
  const c = colorFor(VIDEO,v.ch);
  return `<a class="vcard" href="${url}" target="_blank" rel="noopener" style="animation-delay:${i*35}ms">
    <div class="thumbwrap">
      <img loading="lazy" src="${v.thumb}" alt="" data-vid="${esc(v.vid)}" data-step="0"
        onerror="(function(im){var v=im.getAttribute('data-vid');var s=+im.getAttribute('data-step');var f=['hqdefault','mqdefault','default'];s++;if(v&&s<f.length){im.setAttribute('data-step',s);im.src='https://i.ytimg.com/vi/'+v+'/'+f[s]+'.jpg';}else{im.style.display='none';}})(this)">
      <span class="playbtn">

}
function openChannelTile(ch, secondary){
  const url = `https://www.youtube.com/${ch.handle}`;
  return `<a class="openchan" href="${url}" target="_blank" rel="noopener">
    <span class="lbl">${secondary?"Open more from ":""}${esc(ch.name)} on YouTube</span>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="${ch.color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>

}

/* --- podcast: free on-device text-to-speech, no API --- */
function stopSpeak(){
  try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
  state.speaking = false;
}
function speakSummary(){
  if(!window.speechSynthesis){ return; }
  if(state.speaking){ stopSpeak(); render(); return; }
  const items = state.sumView === "kolkata" ? (state.kolkata || []) : (state.sum[state.sumView] || []);
  if(!items.length) return;
  const label = state.sumView === "kolkata" ? "Top breaking news in Kolkata. "
              : state.sumView === "ai" ? "Top A.I. news. "
              : "Top breaking news. ";
  let text = "Brief. " + label;
  items.forEach((s,i) => { text += (i+1) + ". " + (s.t||s.title||"") + ". " + (s.d?s.d+". ":""); });
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0; u.pitch = 1.05;
  // Prefer a female voice (works on iOS/Android/desktop where available)
  try{
    const voices = window.speechSynthesis.getVoices() || [];
    const femaleNames = /female|samantha|karen|moira|tessa|fiona|victoria|serena|allison|ava|susan|zira|joana|google uk english female|google us english/i;
    const pick = voices.find(v => /^en/i.test(v.lang) && femaleNames.test(v.name))
              || voices.find(v => femaleNames.test(v.name))
              || voices.find(v => /^en/i.test(v.lang));
    if(pick) u.voice = pick;
  }catch(e){}
  u.onend = () => { state.speaking = false; render(); };
  u.onerror = () => { state.speaking = false; render(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
  state.speaking = true; render();
}

function render(){
  try{
    // sticky chip offset
    const hdr = document.querySelector("header");
    if(hdr) document.documentElement.style.setProperty("--hh", hdr.offsetHeight+"px");
    const isSearch = state.tab === "search";
    if($searchbar) $searchbar.style.display = (state.tab === "summary" || isSearch) ? "none" : "block";
    renderChips();
    if(state.tab==="print") renderPrint();
    else if(state.tab==="video") renderVideo();
    else if(state.tab==="summary") renderSummary();
    else if(state.tab==="search") renderSearchTab();
    document.querySelectorAll("nav button").forEach(b => b.classList.toggle("on", b.dataset.tab===state.tab));
  }catch(e){ console.warn("render error:", e); }
}

async function doWebSearch(){
  const q = state.searchQ.trim();
  if(!q || state.searchLoading) return;
  state.searchLoading = true;
  state.searchResults = [];
  state.searchError = "";
  render();

  try{
    // Build a broad set of Google News RSS queries for the topic
    const queries = [
      `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-IN&gl=IN&ceid=IN:en`,
      `https://news.google.com/rss/search?q=${encodeURIComponent(q+" news")}&hl=en-IN&gl=IN&ceid=IN:en`,
      `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`,
    ];
    const results = await Promise.allSettled(queries.map(async url => {
      try{ return parsePrint(await proxyFetch(url)); }
      catch(e){ try{ return await fetchViaRss2Json(url); }catch(e2){ return []; } }
    }));
    let items = [];
    results.forEach(r => { if(r.status==="fulfilled" && Array.isArray(r.value)) items.push(...r.value); });

    // De-dupe and tag source from title suffix
    const seen = new Set();
    items = items.sort((a,b)=>(b.ts||0)-(a.ts||0)).filter(i => {
      const k = (i.title||"").toLowerCase().slice(0,70);
      if(!k || seen.has(k)) return false;
      seen.add(k);
      return true;
    }).slice(0, 30).map(i => {
      // Extract source from Google News title pattern "Headline - Source"
      const srcMatch = (i.title||"").match(/[-–]\s*([\w\s\.]+)$/);
      const src = srcMatch ? srcMatch[1].trim().slice(0,16) : "";
      const cleanTitle = src ? i.title.replace(new RegExp("[-–]\\s*" + src.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + "$"), "").trim() : i.title;
      return { t: cleanTitle||i.title, d: i.dek||"", l: i.link||"", ts: i.ts||0, src };
    });

    if(items.length){
      state.searchResults = items;
    } else {
      state.searchError = `No recent news found for "${q}". Try broader keywords.`;
    }
  }catch(e){
    state.searchError = "Search failed. Check your connection and try again.";
  }
  state.searchLoading = false;
  render();
}

/* --- boot: show cache instantly, then refresh in background --- */
try{ if(window.speechSynthesis){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); } }catch(e){}

async function loadKolkata(){
  if(state.loadingKol) return;
  state.loadingKol = true; render();
  try{
    // Direct newspaper RSS feeds for Kolkata (most reliable — no Google News middleman)
    const directFeeds = [
      // Telegraph India – West Bengal & Calcutta sections
      "https://www.telegraphindia.com/west-bengal/feed",
      "https://www.telegraphindia.com/calcutta/feed",
      "https://www.telegraphindia.com/bengal/feed",
      // The Hindu – Kolkata section
      "https://www.thehindu.com/news/cities/kolkata/feeder/default.rss",
      // Times of India – Kolkata
      "https://timesofindia.indiatimes.com/rssfeeds/-2128936835.cms",
      "https://timesofindia.indiatimes.com/city/kolkata/rssfeeds/1.cms",
      // Indian Express – Kolkata
      "https://indianexpress.com/section/cities/kolkata/feed/",
      // NDTV – Kolkata / West Bengal
      "https://feeds.feedburner.com/ndtvnews-kolkata-news",
      "https://www.ndtv.com/rss/kolkata",
    ];

    // Google News search feeds as additional pool
    const gnFeeds = [
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("West Bengal Kolkata") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata crime politics") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata development Bengal") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:telegraphindia.com") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:timesofindia.indiatimes.com") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:thehindu.com") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:indianexpress.com") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:ndtv.com") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata Mamata TMC BJP Bengal politics") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Kolkata site:telegraphindia.com West Bengal") + "&hl=en-IN&gl=IN&ceid=IN:en",
      "https://news.google.com/rss/search?q=" + encodeURIComponent("Bengal flood weather Kolkata") + "&hl=en-IN&gl=IN&ceid=IN:en",
    ];

    const allFeeds = [...directFeeds, ...gnFeeds];

    // Fetch all feeds in parallel; each tries proxy first then rss2json bridge
    const results = await Promise.allSettled(allFeeds.map(async feed => {
      try{ const r = parsePrint(await proxyFetch(feed)); if(r.length >= 1) return r; }catch(e){}
      try{ return await fetchViaRss2Json(feed); }catch(e){ return []; }
    }));

    let items = [];
    results.forEach(r => { if(r.status==="fulfilled" && Array.isArray(r.value)) items.push(...r.value); });

    // Fallback: filter from already-loaded print news if we still don't have enough
    if(items.length < 10){
      const fromPrint = Object.values(state.print).flat().filter(i =>
        /kolkata|west bengal|bengal/i.test((i.title||"") + " " + (i.dek||""))
      );
      items.push(...fromPrint);
    }

    // De-duplicate: strip source suffix then use first 80 chars as key
    const seen = new Set();
    items = items
      .sort((a,b) => (b.ts||0) - (a.ts||0))
      .filter(i => {
        const raw = (i.title||"").toLowerCase().replace(/\s+[-–|]\s+[\w\s]+$/, "").trim();
        const k = raw.slice(0, 80);
        if(!k || seen.has(k)) return false;
        seen.add(k);
        return true;
      });

    if(items.length){
      state.kolkata = items.slice(0,40).map(i => ({ t:i.title, d:i.dek||"", l:i.link||"", ts:i.ts||0 }));
      save("brief.kolkata", state.kolkata);
    }
  }catch(e){ console.warn("Kolkata refresh failed", e); }
  state.loadingKol = false;
  render();
}

// Global safety net: catch any unhandled JS errors so page never goes fully blank
window.addEventListener("error", e => { console.warn("Brief caught error:", e.message); });
window.addEventListener("unhandledrejection", e => { e.preventDefault(); console.warn("Brief caught rejection:", e.reason); });

hydrateCache();
try{ render(); }catch(e){ console.warn("render boot error:", e); }

/* Single refresh entry point: feeds + Kolkata together.
   Runs on every open, every manual refresh, every tab switch, every time the page/app returns to foreground.
   No setInterval — event-driven only, no background battery drain. */
let _autoRefreshing = false;
async function autoRefresh(){
  if(_autoRefreshing) return;
  _autoRefreshing = true;
  try{ await Promise.allSettled([refreshFeeds(), loadKolkata()]); }
  finally{ _autoRefreshing = false; }
}

// Refresh on open/load
autoRefresh();

// Refresh when user returns to this tab/window (desktop browser tab switch or mobile app switch)
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible") autoRefresh();
});

// Refresh when user navigates back to the page (back button, bfcache restore on iOS Safari)
window.addEventListener("pageshow", e => {
  if(e.persisted) autoRefresh();   // persisted = restored from bfcache
});

// Note: focus listener removed — visibilitychange + pageshow cover all real re-open cases
// without firing on every user interaction within the page.
